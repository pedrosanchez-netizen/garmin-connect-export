name: Mi Robot Garmin
on:
  schedule:
    - cron: '0 09 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar mi copia
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas
        run: pip install garminconnect

      - name: Ejecutar Extracción
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python -c "
          import os
          from garminconnect import Garmin
          from datetime import date

          try:
              # Conexión estándar
              client = Garmin(os.getenv('GARMIN_EMAIL'), os.getenv('GARMIN_PASSWORD'))
              client.login()
              
              # Pedimos los datos de hoy
              stats = client.get_stats(date.today().isoformat())
              
              # Guardamos en el archivo
              with open('mis_datos_garmin.txt', 'w') as f:
                  f.write(str(stats))
              print('¡Éxito! Datos guardados en el archivo.')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
      - name: Guardar en GitHub
        run: |
          git config --global user.name 'GarminRobot'
          git config --global user.email 'robot@github.com'
          git add mis_datos_garmin.txt
          git commit -m 'Actualización de datos' || echo 'Sin cambios'
          git push
