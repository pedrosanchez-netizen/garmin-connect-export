name: Mi Robot Garmin
on:
  schedule:
    - cron: '0 07 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar mi copia
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar herramientas
        run: pip install garminconnect

      - name: Ejecutar Extracción con Sesión
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python -c "
          import os
          from garminconnect import Garmin
          from datetime import date
          import shutil

          email = os.getenv('GARMIN_EMAIL')
          password = os.getenv('GARMIN_PASSWORD')
          token_store = '.garmin_tokens'
          
          if not os.path.exists(token_store):
              os.makedirs(token_store)

          try:
              # Intentamos entrar usando la sesión guardada si existe
              client = Garmin(email, password, is_cn=False, prompt_mfa=None, token_store=token_store)
              client.login()
              
              stats = client.get_stats(date.today().isoformat())
              with open('mis_datos_garmin.txt', 'w') as f:
                  f.write(str(stats))
              print('¡Éxito! Datos extraídos.')
          except Exception as e:
              print(f'Error detallado: {e}')
              if '429' in str(e):
                  print('Garmin nos ha bloqueado temporalmente por exceso de intentos. Hay que esperar 24h.')
              exit(1)
          "
      - name: Guardar datos y sesión
        run: |
          git config --global user.name 'GarminRobot'
          git config --global user.email 'robot@github.com'
          git add mis_datos_garmin.txt .garmin_tokens/ || true
          git commit -m 'Actualización con sesión' || echo 'Sin cambios'
          git push
